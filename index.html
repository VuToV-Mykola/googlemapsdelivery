<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Планувальник доставки з Google Maps: розрахунок маршруту, часу, відстані та тарифу.">
    <title>Планувальник маршруту доставки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="Content/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="css/app.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ab2155e76b.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-section" aria-labelledby="page-title">
        <div class="container">
          <header class="hero-header">
            <p class="eyebrow">Google Maps Delivery</p>
            <h1 id="page-title">Швидкий розрахунок маршруту та вартості доставки</h1>
            <p class="hero-text">
              Вкажіть адресу отримувача або поставте точку на мапі, щоб отримати відстань,
              прогнозований час у дорозі та актуальні тарифи.
            </p>
          </header>

          <div class="delivery-panel">
            <section class="map-card" aria-label="Мапа маршруту доставки">
              <div id="deliveryMap" class="delivery-map"></div>
              <a id="pageQrLink" class="qr-card" href="#" target="_blank" rel="noopener">
                <img id="pageQrCode" class="qr-code" src="./Images/qr-code.png" alt="QR-код поточної сторінки">
                <span>Відкрити на телефоні</span>
              </a>
            </section>

            <section class="search-card" aria-label="Параметри маршруту">
              <form class="delivery-form" autocomplete="off">
                <div class="form-group route-field">
                  <label for="from" class="route-label">
                    <i class="far fa-dot-circle" aria-hidden="true"></i>
                    <span>Початкова адреса</span>
                  </label>
                  <div class="route-input">
                    <input
                      type="text"
                      id="from"
                      placeholder="Адреса відправлення"
                      class="form-control input-origin search-text-field"
                      value="проспект Степана Бандери, 36, Київ, 04073">
                    <button class="voice-search-button voice-search-button-origin" type="button" title="Голосовий пошук">
                      <span class="sr-only">Голосовий пошук початкової адреси</span>
                    </button>
                  </div>
                </div>

                <div class="form-group route-field">
                  <label for="to" class="route-label">
                    <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                    <span>Адреса доставки</span>
                  </label>
                  <div class="route-input">
                    <input
                      type="text"
                      id="to"
                      placeholder="Адреса доставки"
                      class="form-control input-destination search-text-field">
                    <button class="voice-search-button voice-search-button-destination" type="button" title="Голосовий пошук">
                      <span class="sr-only">Голосовий пошук адреси доставки</span>
                    </button>
                  </div>
                </div>
              </form>
              <div id="output" class="result-card" role="status" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </section>
      <div id="hidden"></div>
    </main>

    <script src="config.local.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.3.6/dist/sweetalert2.all.min.js"></script>
    <script src="dragable-route.js"></script>
  </body>
</html>
